<!doctype html>
<html lang="es-AR">
<head>
<meta charset="utf-8" />
<title>OG · Estudio Ghetti</title>
<style>
  :root{
    --navy:#1B2A4A;
    --gold:#B8986A;
    --gold-light:#D4B88A;
    --bg:#F8F6F2;
    --white:#FFFFFF;
    --text:#1A1A1A;
    --text-muted:#5A5A6A;
    --border:#E0DBD4;
    --serif:'Georgia','Times New Roman',serif;
    --sans:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#2a2a2a}
  body{
    font-family:var(--sans);
    color:var(--text);
    padding:32px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
  }

  .flyer{
    width:1200px;
    height:630px;
    background:var(--bg);
    color:var(--text);
    position:relative;
    overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.4);
    display:flex;
    flex-direction:column;
  }

  .flyer::before{
    content:"";position:absolute;top:0;left:0;right:0;height:10px;
    background:linear-gradient(90deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);
    z-index:3;
  }

  .top{
    display:flex;
    align-items:center;
    gap:24px;
    padding:64px 72px 0 72px;
  }
  .top img{
    width:96px;height:96px;object-fit:contain;flex-shrink:0;
  }
  .top .who strong{
    display:block;
    font-family:var(--serif);
    font-size:30px;
    color:var(--navy);
    line-height:1.15;
  }
  .top .who span{
    display:block;
    font-size:14px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-top:6px;
  }

  .hero{
    padding:48px 72px 0 72px;
    flex:1;
  }
  .title{
    font-family:var(--serif);
    font-size:78px;
    font-weight:400;
    color:var(--navy);
    line-height:1.0;
    letter-spacing:-1.5px;
    margin-bottom:28px;
  }
  .title em{
    font-style:italic;
    color:var(--gold);
  }
  .areas-grid{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
  }
  .area{
    background:var(--white);
    border:1px solid var(--border);
    border-left:4px solid var(--gold);
    border-radius:8px;
    padding:14px 22px;
    font-family:var(--serif);
    font-size:22px;
    color:var(--navy);
  }

  .foot{
    background:var(--navy);
    color:var(--white);
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 72px;
    gap:24px;
  }
  .foot .brand{
    font-family:var(--serif);
    font-size:18px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--gold);
  }
  .foot .url{
    font-size:16px;
    letter-spacing:0.08em;
    color:rgba(255,255,255,0.85);
  }
</style>
</head>
<body>

<div class="flyer">

  <div class="top">
    <img src="../../public/logo.png" alt="Estudio Ghetti" />
    <div class="who">
      <strong>Dra. Adriana Ghetti</strong>
      <span>Abogada UBA · Matrícula CASI</span>
    </div>
  </div>

  <div class="hero">
    <h1 class="title">Estudio <em>Ghetti</em></h1>
    <div class="areas-grid">
      <div class="area">Jubilación docente</div>
      <div class="area">Sucesiones</div>
      <div class="area">Multas de tránsito</div>
    </div>
  </div>

  <div class="foot">
    <div class="brand">Estudio Ghetti</div>
    <div class="url">estudioghetti.com</div>
  </div>

</div>

</body>
</html>
